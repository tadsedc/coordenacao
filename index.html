function table(l,edit=true,day=false){if(!l.length)return '<div class="empty">Nenhuma aula encontrada neste dia da semana.</div>';let ds=shortDays;let rows='<div class="table desktop-schedule"><table><thead><tr>'+(day?'<th>Dia</th>':'')+'<th>Horário</th><th>Turma e disciplina</th><th>Professor</th><th>Localização</th><th>Status</th>'+(edit?'<th>Ações</th>':'')+'</tr></thead><tbody>'+l.map(c=>{let ok=classConfirmed(c),canEdit=!isSemi(c)&&(state.role==='coord'||c.teacherId===state.teacherId),actions=canEdit?'<div class="action-stack"><button class="mini" data-edit="'+c.id+'">Alterar sala</button>'+(state.role==='coord'?'<button class="mini danger" data-delclass="'+c.id+'">Excluir aula</button>':'')+'</div>':state.role==='coord'?'<div class="action-stack"><button class="mini danger" data-delclass="'+c.id+'">Excluir aula</button></div>':'<span class="muted">Somente o professor responsável</span>';return '<tr>'+(day?'<td><b>'+ds[c.day]+'</b></td>':'')+'<td class="time">'+classStart(c)+'<small>'+classUntil(c)+'</small></td><td class="discipline"><b>'+c.subject+'</b><small>'+c.code+' · '+c.group+'</small>'+courseTags(c)+'</td><td>'+classTeacher(c)+'</td><td><span class="badge '+(!ok?'pending':'')+'">'+classRoomLabel(c)+'</span></td><td><span class="status '+(!ok?'pending':'')+'">'+(ok?'Confirmada':'Pendente')+'</span></td>'+(edit?'<td>'+actions+'</td>':'')+'</tr>'}).join('')+'</tbody></table></div>';let cards='<div class="mobile-schedule">'+l.map(c=>{let ok=classConfirmed(c),canEdit=!isSemi(c)&&(state.role==='coord'||c.teacherId===state.teacherId),actions=edit&&canEdit?'<div class="action-stack"><button class="mini" data-edit="'+c.id+'">Alterar sala</button>'+(state.role==='coord'?'<button class="mini danger" data-delclass="'+c.id+'">Excluir aula</button>':'')+'</div>':edit&&state.role==='coord'?'<div class="action-stack"><button class="mini danger" data-delclass="'+c.id+'">Excluir aula</button></div>':edit?'<span class="muted">Somente o professor responsável</span>':'';re function integralization(){let groups=db.groups.filter(g=>g.courses.includes(state.integralCourse));if(!state.integralGroupId&&groups[0])state.integralGroupId=String(groups[0].id);let group=db.groups.find(g=>String(g.id)===String(state.integralGroupId)),items=db.curriculum.filter(d=>d.course===state.integralCourse),actions='<div class="head-actions"><button class="btn soft" data-newcurriculum>＋ Nova disciplina da matriz</button></div>',toolbar='<div class="toolbar"><select id="integral-course"><option value="ADS" '+(state.integralCourse==='ADS'?'selected':'')+'>ADS</option><option value="EDC" '+(state.integralCourse==='EDC'?'selected':'')+'>EDC</option></select><select id="integral-group">'+groups.map(g=>'<option value="'+g.id+'" '+(String(g.id)===String(state.integralGroupId)?'selected':'')+'>'+g.name+'</option>').join('')+'</select><div class="grow"></div><span class="live">Controle interno da coordenação</span></div>';let rows=items.map(d=>{let p=db.progress.find(x=>String(x.groupId)===String(state.integralGroupId)&&x.course===d.course&&normalizedLesson(x.subject)===normalizedLesson(d.subject))||{},status=p.status||'pendente';return '<tr><td><b>'+d.semester+'º</b></td><td><b>'+d.subject+'</b><br><small>'+(d.code||'S/C')+(d.hours?' · '+d.hours+'h':'')+'</small></td><td><select data-prog-status="'+d.id+'">'+Object.entries(progressLabels).map(([k,v])=>'<option value="'+k+'" '+(status===k?'selected':'')+'>'+v+'</option>').join('')+'</select></td><td><input data-prog-term="'+d.id+'" value="'+(p.term||'')+'" placeholder="Ex.: 2026/1"></td><td><input data-prog-notes="'+d.id+'" value="'+(p.notes||'')+'" placeholder="Observações"></td><td><button class="mini" data-saveprogress="'+d.id+'">Salvar</button></td></tr>'}).join('');let empty='<div class="empty">Nenhuma disciplina cadastrada na matriz de '+state.integralCourse+'. Clique em “Nova disciplina da matriz” para começar.</div>';return layout(head('Gestão acadêmica','Integralização das Turmas','Acompanhe quais disciplina function settings(){return layout(head('Personalização','Aparência','Altere a identidade visual exibida em todos os painéis.')+'<div class="settings"><section class="settings-card"><h2>Identidade visual</h2><p>As alterações são aplicadas imediatamente neste navegador.</p><div class="field"><label>Nome da plataforma</label><input id="theme-brand" value="'+theme.brand+'"></div><div class="colorrow"><div class="field colorfield"><label>Cor principal</label><input id="theme-primary" type="color" value="'+theme.primary+'"></div><div class="field colorfield"><label>Cor de destaque</label><input id="theme-accent" type="color" value="'+theme.accent+'"></div><div class="field colorfield"><label>Cor de fundo</label><input id="theme-bg" type="color" value="'+theme.background+'"></div></div><div class="field"><label>Logo da instituição</label><input id="theme-logo" type="file" accept="image/png,image/jpeg,image/svg+xml"></div><p class="hint">Use uma imagem quadrada, preferencialmente PNG ou SVG. O logo fica salvo localmente neste protótipo.</p><div class="actions"><button class="btn soft" id="reset-theme">Restaurar padrão</button><button class="btn primary" id="save-theme">Salvar aparência</button></div></section><aside class="settings-card"><h2>Pré-visualização</h2><p>Identidade exibida na barra lateral e no login.</p><div class="logo-preview">'+brandVisual()+'</div></aside></div>','Aparência')}
const courseNames={ADS:'Análise e Desenvolvimento de Sistemas',EDC:'Engenharia de Computação'};
function courseLabel(code){return courseNames[code]?code+' ? '+courseNames[code]:(code||'')}
function publicLayout(content){let controls='';if(state.role==='student'){controls='<a class="mini" href="'+portalRoot+'/estagio/">Estágio</a>'+(state.course?'<button class="mini" id="switch-course">Trocar curso</button>':'<a class="mini" href="'+portalRoot+'/professor/">Sou Professor</a>')}else{controls=(state.course?'<button class="mini" id="switch-course">Trocar curso</button>':'')+'<button class="mini" id="public-back">&larr; Voltar ao painel</button>'}let mainClass='public-main'+(content.includes('portal-gate')?' gate-main':'');return '<div class="public-shell"><header class="public-header"><a class="loginbrand" href="'+portalRoot+'/">'+brandVisual()+'</a><div class="action-stack">'+controls+'</div></header><main class="'+mainClass+'">'+content+'</main></div>'}
function requirementLoginPage(){return publicLayout('<section class="portal-gate"><div class="gate-inner"><p class="eyebrow">Estágio Obrigatório</p><h1>Acesso do estudante</h1><p class="sub">Use o código temporário fornecido pela coordenação para gerar os documentos de estágio obrigatório no modelo da AEMS.</p><form class="loginform" id="studentreqform" style="max-width:520px;margin:24px auto 0;text-align:left"><div class="error-msg" id="studentreqerror">Código ou senha inválidos.</div><div class="field"><label>Código de acesso</label><input id="studentcode" placeholder="Ex.: EST-1234" required></div><div class="field"><label>Senha temporária</label><input id="studentpass" type="password" required></div><button class="btn primary" type="submit">Acessar estágio</button><div class="student-login-note">Este acesso serve apenas para preencher e gerar documentos de estágio. Ele não substitui o Portal do Aluno da AEMS.</div></form></div></section>')}
function courseGate(){return publicLayout('<section class="portal-gate"><div class="gate-inner"><p class="eyebrow">Portal de Comunicação da Coordenação de ADS e EDC</p><h1>Escolha seu curso</h1><p class="sub">Consulte salas, horários e informações acadêmicas da coordenação.</p><div class="course-options"><a class="course-option ads" href="'+portalRoot+'/ads/"><span class="course-symbol">⌘</span><b>Análise e Desenvolvimento de Sistemas</b><span>Horários, salas e informações acadêmicas de TADS.</span></a><a class="course-option edc" href="'+portalRoot+'/edc/"><span class="course-symbol">⚙</span><b>Engenharia de Computação</b><span>Horários, salas e informações acadêmicas de EDC.</span></a><a class="course-option professor" style="display:block;text-decoration:none" href="https://www.aems.edu.br" target="_blank" rel="noopener"><span class="course-symbol">↗</span><b>Portal do Aluno - AEMS</b><span>Consultar boletim, solicitações, financeiro e demais informações institucionais.</span></a></div><div class="portal-disclaimer"><strong>Importante</strong><p>Este site não substitui o Portal do Aluno disponível no site da AEMS. Ele tem como finalidade apenas facilitar a comunicação entre a coordenação dos cursos e os estudantes, especialmente em relação à divulgação de salas e demais comunicados acadêmicos. O acesso ao boletim, solicitações financeiras e outras ações institucionais deve ser realizado exclusivamente pelo site <a href="https://www.aems.edu.br" target="_blank" rel="noopener">www.aems.edu.br</a>.</p></div></div></section>')}
function portalTabs(){return '<div class="portal-tabs"><button class="portal-tab '+(state.publicTab==='schedule'?'on':'')+'" data-publictab="schedule">Horários e salas</button><button class="portal-tab '+(state.publicTab==='notices'?'on':'')+'" data-publictab="notices">Informes da coordenação</button><button class="portal-tab '+(state.publicTab==='teachers'?'on':'')+'" data-publictab="teachers">Professores</button><button class="portal-tab '+(state.publicTab==='exams'?'on':'')+'" data-publictab="exams">Calendário de Avaliações</button></div>'}
function portalHero(){return '<section class="portal-hero '+(state.course==='EDC'?'edc':'')+'"><div><small>Portal de Comunicação da Coordenação de ADS e EDC</small><h1>'+courseNames[state.course]+'</h1><p>Coordenação de TADS e EDC · Faculdades AEMS</p></div><span class="course-pill">'+state.course+'</span></section>'}
function publicFilter(){let ps=['Todos',...db.groups.filter(g=>g.courses.includes(state.course)).map(g=>g.name)];return '<div class="student-filter"><div class="field"><label>Qual é a sua turma?</label><select id="period"><option value="Todos">Todas as turmas</option>'+ps.filter(x=>x!=='Todos').map(x=>'<option '+(x===state.period?'selected':'')+'>'+x+'</option>').join('')+'</select></div><div class="field"><label>Dia da semana</label>'+weekdayControl()+'</div><div><span class="live">Grade atualizada</span></div></div>'}
function portalSchedule(){let l=list(),selection=state.period==='Todos'?'Todas as turmas':state.period;return publicFilter()+'<div class="results-head"><h2>Horários e salas · '+selection+'</h2><span>'+l.length+' aula(s) · '+dayNames[state.weekday]+'</span></div>'+tiles(l)}
function portalNotices(){let items=db.notices.filter(n=>n.courses.includes(state.course));return '<div class="results-head"><h2>Informes da coordenação</h2><span>'+items.length+' comunicado(s)</span></div><div class="notice-grid">'+(items.length?items.map(n=>'<article class="notice-card"><time>'+new Date(n.published).toLocaleDateString('pt-BR')+'</time><h3>'+n.title+'</h3><p>'+n.body+'</p></article>').join(''):'<div class="empty">Nenhum informe publicado para este curso.</div>')+'</div>'}
function portalTeachers(){let items=db.teachers;return '<div class="results-head"><h2>Professores</h2><span>'+items.length+' docente(s)</span></div><div class="teacher-public-grid">'+(items.length?items.map(t=>{return '<article class="teacher-public-card">'+teacherAvatar(t)+'<h3>'+t.name+'</h3><a href="mailto:'+t.email+'">'+t.email+'</a><div class="pref-section"><small>Como entrar em contato</small>'+chips(t.contacts)+(t.whatsapp?'<div class="muted" style="margin-top:7px">'+t.whatsapp+'</div>':'')+'</div><div class="pref-section"><small>Materiais de aula</small>'+chips(t.materials,'material')+(t.classroomUrl?'<div style="margin-top:9px"><a href="'+t.classroomUrl+'" target="_blank" rel="noopener">Abrir Google Classroom ↗</a></div>':'')+(t.githubUrl?'<div style="margin-top:9px"><a href="'+t.githubUrl+'" target="_blank" rel="noopener">Abrir repositório no GitHub ↗</a></div>':'')+'</div></article>'}).join(''):'<div class="empty">Nenhum professor cadastrado.</div>')+'</div>'}
function publicPage(){if(state.publicTab==='requirements')return requirementLoginPage();if(!['ADS','EDC'].includes(state.course))return courseGate();let body={schedule:portalSchedule,notices:portalNotices,teachers:portalTeachers,exams:portalExams}[state.publicTab]();return publicLayout(portalHero()+portalTabs()+body)}
const contactOptions=['Portal do Aluno','E-mail','WhatsApp','Somente presencial'];const materialOptions=['Portal do Aluno','Google Classroom','GrupoAU','GitHub'];
function prefFields(t={contacts:[],materials:[],whatsapp:'',classroomUrl:'',githubUrl:'',avatarUrl:''}){let usesClassroom=t.materials?.includes('Google Classroom'),usesGithub=t.materials?.includes('GitHub'),photo='<div class="field"><label>Foto do perfil (opcional)</label>'+(t.avatarUrl?'<div class="profile-summary" style="margin:8px 0 12px">'+teacherAvatar(t)+'<label class="pref-pick"><input type="checkbox" id="tphoto-remove"> Remover foto atual</label></div>':'')+'<input id="tphoto" type="file" accept="image/jpeg,image/png,image/webp"><small class="muted">JPG, PNG ou WebP · máximo 2 MB. Sem foto, serão exibidas as iniciais.</small></div>';return photo+'<div class="field"><label>Formas de contato</label><div class="pref-picks">'+contactOptions.map(x=>'<label class="pref-pick"><input type="checkbox" class="contact-opt" value="'+x+'" '+(t.contacts?.includes(x)?'checked':'')+'> '+x+'</label>').join('')+'</div></div><div class="field"><label>WhatsApp (opcional)</label><input id="tw" value="'+(t.whatsapp||'')+'" placeholder="(67) 99999-9999"></div><div class="field"><label>Onde estão os materiais de aula?</label><div class="pref-picks">'+materialOptions.map(x=>'<label class="pref-pick"><input type="checkbox" class="material-opt" value="'+x+'" '+(x==='Google Classroom'?'data-classroom-toggle ':'')+(x==='GitHub'?'data-github-toggle ':'')+(t.materials?.includes(x)?'checked':'')+'> '+x+'</label>').join('')+'</div></div><div class="field" id="classroom-url-wrap" style="display:'+(usesClassroom?'block':'none')+'"><label>Link da turma no Google Classroom</label><input id="tclassroom" type="url" value="'+(t.classroomUrl||'')+'" placeholder="https://classroom.google.com/..."></div><div class="field" id="github-url-wrap" style="display:'+(usesGithub?'block':'none')+'"><label>Link do repositório no GitHub</label><input id="tgithub" type="url" value="'+(t.githubUrl||'')+'" placeholder="https://github.com/usuario/repositorio"></div>'}

function requirements(){let rows=db.requirements.map(r=>{let delivered=r.status==='entregue',status='<span class="status '+(delivered?'entregue':'gerado')+'">'+(delivered?'Entregue':'Gerado pelo estudante')+'</span>',deliver=delivered?'<small>'+new Date(r.delivered).toLocaleDateString('pt-BR')+'</small>':'<button class="mini" data-deliverreq="'+r.id+'">Marcar como ENTREGUE</button>',actions='<div class="action-stack">'+deliver+'<button class="mini danger" data-delreq="'+r.id+'">Apagar</button></div>';return '<tr><td><b>'+r.student+'</b><br><small>'+r.email+'</small></td><td>'+r.course+'<br><small>RA: '+(r.ra||'-')+'</small><br><small>'+(r.data?.modalidade==='aproveitamento_experiencia'?'Aproveitamento de Experiência':'Estágio Curricular')+'</small></td><td>'+new Date(r.created).toLocaleDateString('pt-BR')+'</td><td>'+status+'</td><td>'+actions+'</td></tr>'}).join('');return layout(head('Estágio Obrigatório','Estágio','Acompanhe os estudantes que geraram documentos de estágio obrigatório.','<button class="btn primary" data-newstudentaccess>+ Criar acesso temporário</button>')+'<div class="card"><div class="cardhead"><h2>Documentos gerados pelos estudantes</h2><small>'+db.requirements.length+' registro(s)</small></div><div class="table"><table><thead><tr><th>Estudante</th><th>Curso</th><th>Geração</th><th>Status</th><th>Ações</th></tr></thead><tbody>'+(rows||'<tr><td colspan="5"><div class="empty">Nenhum documento gerado ainda.</div></td></tr>')+'</tbody></table></div></div>','Estágio')}
function lgpdNotice(){return '<div class="notice"><strong>Privacidade e LGPD</strong><br>Os dados informados nesta tela são usados exclusivamente para gerar os documentos de estágio e registrar, para a coordenação, que a documentação foi gerada. O portal não publica esses dados e não substitui os sistemas oficiais da AEMS.</div>'}
function reqInput(id,label,type='text',placeholder=''){return '<div class="field"><label>'+label+'</label><input id="'+id+'" type="'+type+'" placeholder="'+placeholder+'"></div>'}
function studentRequirementPage(){let a=state.studentAccess||{}, name=a.nome||'';return layout(head('Estágio Obrigatório','Gerar documentos','Preencha os dados uma vez e baixe os documentos padronizados em .docx.')+'<div class="stage-guidance"><strong>Orientações após gerar os documentos</strong><p>Após o preenchimento completo do Convênio, se houver, TCE e Plano de Atividades:</p><ol><li>Imprimir três vias de cada documento.</li><li>Levar ao coordenador do curso para assinaturas, consultando dia e horário de coordenação.</li><li>Após a assinatura do coordenador, levar à secretaria para colher a assinatura da instituição.</li><li>Escanear o documento, ou tirar uma foto, desde que esteja totalmente legível.</li><li>Enviar o arquivo digitalizado pelo upload disponível no final da página.</li></ol><p>Após a conclusão do estágio, solicite à coordenação o modelo de relatório de atividades e entregue-o com as devidas comprovações de realização do plano de trabalho.</p></div>'+lgpdNotice()+'<div class="notice"><strong>Documentos gerados</strong><br>O sistema vai baixar três arquivos: Convênio de Estágio, Termo de Compromisso e Plano de Atividades. A coordenação visualizará apenas que o estudante gerou os documentos e marcará como ENTREGUE após receber o processo físico.</div><section class="req-card"><h2>Dados para os documentos</h2><p class="sub">Após gerar, imprima os documentos, colete as assinaturas necessárias, leve-os à secretaria e entregue à coordenação via upload disponível no final da página.</p><div class="req-form" id="reqform"><div class="req-section"><h3>Estudante</h3>'+reqInput('req_nome','Nome completo','text',name)+reqInput('req_ra','Matrícula/RA')+'<div class="two">'+reqInput('req_cpf','CPF')+reqInput('req_rg','RG/Identidade')+'</div><div class="two">'+reqInput('req_nasc','Data de nascimento','date')+reqInput('req_tel','Telefone')+'</div>'+reqInput('req_email','E-mail','email',a.email||'')+'<div class="two"><div class="field"><label>Curso</label><select id="req_curso"><option value="ADS" '+(a.curso==='ADS'?'selected':'')+'>Análise e Desenvolvimento de Sistemas</option><option value="EDC" '+(a.curso==='EDC'?'selected':'')+'>Engenharia de Computação</option></select></div>'+reqInput('req_periodo','Série/período')+'</div>'+reqInput('req_turno','Turno')+reqInput('req_endereco','Endereço')+'<div class="two">'+reqInput('req_bairro','Bairro')+reqInput('req_cidade','Município')+'</div><div class="two">'+reqInput('req_uf','UF')+reqInput('req_cep','CEP')+'</div></div><div class="req-section"><h3>Unidade concedente / empresa</h3>'+reqInput('emp_razao','Razão social')+'<div class="two">'+reqInput('emp_cnpj','CNPJ')+reqInput('emp_tel','Telefone')+'</div>'+reqInput('emp_ramo','Ramo de atividade')+reqInput('emp_email','E-mail','email')+reqInput('emp_endereco','Endereço')+'<div class="two">'+reqInput('emp_numero','Número')+reqInput('emp_bairro','Bairro')+'</div><div class="two">'+reqInput('emp_cidade','Município')+reqInput('emp_uf','UF')+'</div>'+reqInput('emp_cep','CEP')+'<div class="two">'+reqInput('emp_rep','Representante legal')+reqInput('emp_cargo','Cargo do representante')+'</div></div><div class="req-section"><h3>Estágio</h3><div class="two">'+reqInput('est_inicio','Início','date')+reqInput('est_fim','Término','date')+'</div><div class="two">'+reqInput('est_horario_inicio','Horário de início')+reqInput('est_horario_fim','Horário de término')+'</div>'+reqInput('est_ch','Carga horária semanal')+reqInput('est_setor','Setor de estágio')+'<div class="two">'+reqInput('est_seguradora','Nome da seguradora')+reqInput('est_apolice','Apólice de seguro','text','Obrigatória')+'</div>'+'<div class="field"><label>Atividades desenvolvidas</label><textarea id="est_atividades" placeholder="Descreva as atividades previstas"></textarea></div><div class="two">'+reqInput('est_bolsa','Bolsa-auxílio')+reqInput('est_transporte','Auxílio-transporte')+'</div>'+reqInput('est_beneficios','Outros benefícios')+'<div class="field"><label>Marcações opcionais [X]</label><div class="x-options"><label><input type="checkbox" id="x_vale"> Vale-transporte</label><label><input type="checkbox" id="x_empresa"> Transporte da empresa</label><label><input type="checkbox" id="x_outros"> Outros</label><label><input type="checkbox" id="x_nao_obrigatorio"> Estágio não obrigatório</label></div></div></div><div class="req-section"><h3>Supervisor da empresa</h3>'+reqInput('sup_nome','Nome do supervisor')+'<div class="two">'+reqInput('sup_cargo','Cargo')+reqInput('sup_formacao','Formação')+'</div>'+reqInput('sup_registro','Registro/inscrição profissional')+'</div><label class="pref-pick"><input type="checkbox" id="stage_lgpd_ok"> Declaro ciência de que os dados serão usados apenas para gerar os documentos de estágio e registrar o acompanhamento pela coordenação.</label><div class="actions"><button class="btn primary" id="generate-stage-docs">Gerar documentos .docx</button></div></div></section>','Estágio Obrigatório')}
function expTextarea(id,label,placeholder=''){return '<div class="field"><label>'+label+'</label><textarea id="'+id+'" placeholder="'+placeholder+'"></textarea></div>'}
function experienceRequirementPage(){let a=state.studentAccess||{},name=a.nome||'',activityNotice='<div class="stage-guidance compact"><strong>Atenção</strong><p>O estudante deve apresentar uma descrição técnica e detalhada das atividades, conectando-as aos componentes curriculares do curso e especificando tecnologias, metodologias e projetos realizados. É obrigatória a construção de um relatório sólido e fundamentado, acompanhado de evidências concretas da execução das tarefas, tais como links para repositórios no GitHub, documentação técnica, diagramas de sistemas desenvolvidos ou portfólios de projetos. Toda a descrição e as evidências apresentadas devem ser validadas pela chefia imediata, comprovando a aderência das atividades profissionais ao Projeto Pedagógico do Curso (PPC) para fins de convalidação.</p></div>';return layout(head('Aproveitamento de Experiência','Gerar documentos','Preencha os dados para baixar o Convênio e os Anexos I e II em .docx.')+'<div class="stage-guidance"><strong>Documentos comprobatórios obrigatórios</strong><p>Além dos documentos gerados pelo sistema, entregue conforme sua condição:</p><ul><li><b>Empregado:</b> Cópia da Carteira de Trabalho, Comprovante de Inscrição (CNPJ) da empresa, Documento Comprobatório de Vínculo da Chefia Imediata com a Empresa/Cargo.</li><li><b>Empresário:</b> Contrato Social, Cartão CNPJ e documentos pessoais.</li><li><b>Autônomo:</b> Registro na Prefeitura, comprovante de ISS ou contribuição INSS.</li><li><b>Servidor Público:</b> Portaria de nomeação do aluno e da chefia imediata.</li></ul><p>O processo é o mesmo: gerar, imprimir, coletar assinaturas na empresa, levar para o coordenador assinar e, após isso, passar na secretaria.</p></div>'+lgpdNotice()+'<div class="notice"><strong>Documentos gerados</strong><br>O sistema baixará dois arquivos: Convênio de Estágio e Anexos de Aproveitamento de Experiência Profissional. A coordenação visualizará que os documentos foram gerados e poderá marcar como ENTREGUE após receber o processo físico.</div><section class="req-card"><h2>Dados para aproveitamento</h2><p class="sub">O Convênio será gerado junto com o documento de Aproveitamento de Experiência.</p><div class="req-form" id="expform"><div class="req-section"><h3>Estudante</h3>'+reqInput('exp_nome','Nome completo','text',name)+reqInput('exp_ra','Matrícula/RA')+'<div class="two">'+reqInput('exp_cpf','CPF')+reqInput('exp_rg','RG/Identidade')+'</div><div class="two">'+reqInput('exp_tel','Telefone')+reqInput('exp_email','E-mail','email',a.email||'')+'</div><div class="two"><div class="field"><label>Curso</label><select id="exp_curso"><option value="ADS" '+(a.curso==='ADS'?'selected':'')+'>Análise e Desenvolvimento de Sistemas</option><option value="EDC" '+(a.curso==='EDC'?'selected':'')+'>Engenharia de Computação</option></select></div>'+reqInput('exp_periodo','Semestre/Ano')+'</div><div class="field"><label>Situação de matrícula</label><select id="exp_situacao"><option>Matriculado</option><option>Concluiu componentes curriculares</option><option>Outros</option></select></div></div><div class="req-section"><h3>Unidade concedente / empresa</h3>'+reqInput('exp_emp_razao','Razão social')+'<div class="two">'+reqInput('exp_emp_cnpj','CNPJ')+reqInput('exp_nome_fantasia','Nome fantasia')+'</div><div class="two">'+reqInput('exp_emp_tel','Telefone da empresa')+reqInput('exp_emp_email','E-mail da empresa','email')+'</div>'+reqInput('exp_emp_ramo','Ramo de atividade')+reqInput('exp_emp_endereco','Endereço')+'<div class="two">'+reqInput('exp_emp_numero','Número')+reqInput('exp_emp_bairro','Bairro')+'</div><div class="two">'+reqInput('exp_emp_cidade','Município')+reqInput('exp_emp_uf','UF')+'</div>'+reqInput('exp_emp_cep','CEP')+'<div class="two">'+reqInput('exp_emp_rep','Representante legal')+reqInput('exp_emp_cargo','Cargo do representante')+'</div></div><div class="req-section"><h3>Dados profissionais</h3><div class="two">'+reqInput('exp_cargo_funcao','Cargo / Função exercida')+reqInpu async function uploadStagePdf(type){let input=document.getElementById('upload_'+type),file=input?.files?.[0],a=state.studentAccess||{};if(!file)return toast('Selecione um arquivo PDF.');if(file.type!=='application/pdf'&&!file.name.toLowerCase().endsWith('.pdf'))return toast('Envie apenas arquivos em PDF.');if(file.size>10*1024*1024)return toast('O PDF deve ter até 10 MB.');let safe=file.name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_'),folder=(a.id||'sem-acesso')+'',path=folder+'/'+Date.now()+'_'+type+'_'+safe;try{let upload=await banco.storage.from(STAGE_UPLOAD_BUCKET).upload(path,file,{contentType:'application/pdf',cacheControl:'3600',upsert:false});if(upload.error)throw upload.error;let meta={acesso_id:a.id||null,nome_estudante:a.nome||state.userName||'',email:a.email||'',curso:a.curso||state.course||'',tipo_documento:type,titulo:stageDocTypes[type]||type,nome_arquivo:file.name,caminho:path,tamanho:file.size,status:'enviado'};let saved=await banco.from('estagio_uploads').insert(meta);if(saved.error){await banco.storage.from(STAGE_UPLOAD_BUCKET).remove([path]);throw saved.error}input.value='';toast('PDF enviado para a coordenação.')}catch(error){console.error(error);toast('Não foi possível enviar o PDF: '+error.message)}}

const modalBeforeMatrixEdit=modal;modal=function(){if(!state.modal||state.modal.type!=='editcurriculum')return modalBeforeMatrixEdit();let d=db.curriculum.find(x=>String(x.id)===String(state.modal.id));if(!d)return modalBeforeMatrixEdit();let shell=(body)=>'<div class="modalbg" data-close><div class="modal" onclick="event.stopPropagation()">'+body+'</div></div>',top=(title,sub='')=>'<div class="modaltop"><div><h2>'+title+'</h2>'+(sub?'<p>'+sub+'</p>':'')+'</div><button class="close" data-close>×</button></div>';return shell(top('Editar disciplina da matriz','Altere as informações usadas na integralização das turmas.')+'<div class="two"><div class="field"><label>Curso</label><select id="mc-course"><option value="ADS" '+(d.course==='ADS'?'selected':'')+'>ADS</option><option value="EDC" '+(d.course==='EDC'?'selected':'')+'>EDC</option></select></div><div class="field"><label>Semestre da matriz</label><input id="mc-semester" type="number" min="1" value="'+d.semester+'"></div></div><div class="two"><div class="field"><label>Código</label><input id="mc-code" value="'+(d.code||'')+'" placeholder="Opcional"></div><div class="field"><label>Carga horária</label><input id="mc-hours" type="number" value="'+(d.hours||'')+'" placeholder="Opcional"></div></div><div class="field"><label>Disciplina</label><input id="mc-subject" value="'+d.subject+'"></div><div class="actions"><button class="btn soft" data-close>Cancelar</button><button class="btn primary" id="savecurriculum">Salvar alterações</button></div>')}
